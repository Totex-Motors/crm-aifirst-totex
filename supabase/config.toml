# ============================================================
# DEFAULT (verify_jwt = true) — não listadas aqui
# ============================================================
# Todas as outras funções (~40) herdam o default `verify_jwt = true`,
# ou seja: só usuário logado consegue chamar.
#
# Exemplos: analyze-sales-call, analyze-conversation, generate-*,
# extract-*, coach-suggestion, calculate-commission, manage-team-member,
